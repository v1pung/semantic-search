# Base configuration — shared by all environments.
# Infrastructure services are fully defined here.
# Application services define only what is common: build context, env, ports,
# depends_on. Per-environment details (volumes, restart, command) live in the
# overlay files.
#
# Dev  (auto-loaded):   docker compose up
# Prod (explicit):      docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-semantic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semantic}
      POSTGRES_DB: ${POSTGRES_DB:-semantic_search}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-semantic} -d ${POSTGRES_DB:-semantic_search}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # bash /dev/tcp: no wget/curl in qdrant image; checks TCP readiness
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s

  # ── Application services (common) ──────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Service-network topology — always overrides whatever is in .env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # Prevents tokenizers/joblib from spawning sub-processes (avoids loky semaphore leak)
      TOKENIZERS_PARALLELISM: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      TOKENIZERS_PARALLELISM: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
